kind = "web"
previewPath = "/"
title = "Studio Layse Duarte"
version = "1.0.0"
id = "artifacts/studio-layse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25230

[services.development]
run = "pnpm --filter @workspace/studio-layse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studio-layse", "run", "build" ]
publicDir = "artifacts/studio-layse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25230"
BASE_PATH = "/"
