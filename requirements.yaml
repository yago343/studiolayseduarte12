packages:
  "recharts": "For beautiful revenue and service analytics charts on the dashboard and finances pages"
  "date-fns": "For date formatting and manipulation in calendar and appointments"
  "react-hook-form": "For form state management"
  "@hookform/resolvers": "For Zod schema validation integration with react-hook-form"
  "framer-motion": "For page transitions and smooth micro-interactions"
  "clsx": "Utility for constructing className strings"
  "tailwind-merge": "Utility to merge tailwind classes without style conflicts"

